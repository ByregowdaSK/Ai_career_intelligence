<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career AI Register</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:
        radial-gradient(circle at top right,#2563eb 0%,transparent 30%),
        radial-gradient(circle at bottom left,#38bdf8 0%,transparent 30%),
        linear-gradient(135deg,#0f172a,#172554,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Animated Background */

.bg-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    animation:float 8s infinite alternate ease-in-out;
}

.circle1{
    width:350px;
    height:350px;
    top:-120px;
    left:-120px;
}

.circle2{
    width:250px;
    height:250px;
    bottom:-80px;
    right:-80px;
    animation-delay:2s;
}

.circle3{
    width:180px;
    height:180px;
    top:60%;
    left:10%;
    animation-delay:1s;
}

@keyframes float{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(30px);
    }

}

/* Card */

.register-card{
    width:470px;
    padding:45px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:
        0 15px 40px rgba(0,0,0,0.4),
        inset 0 0 1px rgba(255,255,255,0.4);
    position:relative;
    z-index:10;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}

/* Logo */

.logo-box{
    width:90px;
    height:90px;
    border-radius:24px;
    margin:auto;
    margin-bottom:22px;
    background:linear-gradient(135deg,#3b82f6,#0ea5e9);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 10px 30px rgba(59,130,246,0.5);
}

.logo-box i{
    color:white;
    font-size:40px;
}

/* Heading */

h1{
    text-align:center;
    color:white;
    font-weight:700;
    margin-bottom:6px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:35px;
}

/* Form */

.form-group{
    margin-bottom:22px;
    position:relative;
}

.form-label{
    color:#f1f5f9;
    font-size:14px;
    margin-bottom:8px;
    font-weight:500;
}

.form-control{
    height:56px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.12);
    color:white;
    padding-left:18px;
    padding-right:50px;
    transition:0.3s;
    font-size:15px;
    border:1px solid transparent;
}

.form-control::placeholder{
    color:#dbeafe;
}

.form-control:focus{
    background:rgba(255,255,255,0.18);
    box-shadow:none;
    border:1px solid #60a5fa;
    color:white;
    transform:translateY(-2px);
}

.input-icon{
    position:absolute;
    right:18px;
    top:49px;
    color:#dbeafe;
    cursor:pointer;
    transition:0.3s;
}

.input-icon:hover{
    color:white;
}

/* Password Strength */

.strength-bar{
    width:100%;
    height:6px;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
    background:rgba(255,255,255,0.1);
}

.strength-fill{
    height:100%;
    width:0%;
    border-radius:10px;
    transition:0.4s;
}

.strength-text{
    margin-top:8px;
    font-size:13px;
    color:#dbeafe;
}

/* Button */

.register-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    font-size:17px;
    font-weight:600;
    transition:0.4s;
    overflow:hidden;
    position:relative;
}

.register-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(37,99,235,0.45);
}

.register-btn::before{
    content:'';
    position:absolute;
    width:120px;
    height:120%;
    background:rgba(255,255,255,0.2);
    transform:skewX(-20deg);
    left:-130px;
    top:-5px;
    transition:0.5s;
}

.register-btn:hover::before{
    left:120%;
}

/* Login Link */

.login-text{
    text-align:center;
    margin-top:28px;
    color:#dbeafe;
    font-size:15px;
}

.login-text a{
    color:#7dd3fc;
    text-decoration:none;
    font-weight:600;
}

.login-text a:hover{
    color:white;
}

/* Alerts */

.alert{
    border:none;
    border-radius:14px;
    font-size:14px;
}

/* Responsive */

@media(max-width:520px){

    .register-card{
        width:92%;
        padding:35px 25px;
    }

}

</style>
</head>

<body>

<!-- Background -->
<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>
<div class="bg-circle circle3"></div>

<!-- Card -->
<div class="register-card">

    <!-- Logo -->
    <div class="logo-box">
        <i class="bi bi-person-plus-fill"></i>
    </div>

    <!-- Heading -->
    <h1>Create Account</h1>

    <p class="subtitle">
        Join Career AI and explore your future
    </p>

    <!-- Error -->
    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="/register">

        <!-- Name -->
        <div class="form-group">

            <label class="form-label">
                Full Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter your name"
                required
            >

            <i class="bi bi-person-fill input-icon"></i>

        </div>

        <!-- Email -->
        <div class="form-group">

            <label class="form-label">
                Email Address
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
            >

            <i class="bi bi-envelope-fill input-icon"></i>

        </div>

        <!-- Password -->
        <div class="form-group">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="Create password"
                required
            >

            <i
                class="bi bi-eye-slash-fill input-icon"
                id="togglePassword"
            ></i>

            <!-- Strength -->
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>

            <div class="strength-text" id="strengthText">
                Password strength
            </div>

        </div>

        <!-- Confirm -->
        <div class="form-group">

            <label class="form-label">
                Confirm Password
            </label>

            <input
                type="password"
                name="confirm_password"
                id="confirmPassword"
                class="form-control"
                placeholder="Confirm password"
                required
            >

            <i
                class="bi bi-eye-slash-fill input-icon"
                id="toggleConfirm"
            ></i>

        </div>

        <!-- Button -->
        <button type="submit" class="register-btn">

            <i class="bi bi-person-plus"></i>

            Create Account

        </button>

        <!-- Login -->
        <div class="login-text">

            Already have an account?

            <a href="/login">
                Login
            </a>

        </div>

    </form>

</div>

<!-- JS -->
<script>

/* Toggle Password */

const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");

togglePassword.addEventListener("click", function(){

    if(password.type === "password"){

        password.type = "text";

        this.classList.replace(
            "bi-eye-slash-fill",
            "bi-eye-fill"
        );

    }else{

        password.type = "password";

        this.classList.replace(
            "bi-eye-fill",
            "bi-eye-slash-fill"
        );

    }

});

/* Confirm Password */

const toggleConfirm =
document.getElementById("toggleConfirm");

const confirmPassword =
document.getElementById("confirmPassword");

toggleConfirm.addEventListener("click", function(){

    if(confirmPassword.type === "password"){

        confirmPassword.type = "text";

        this.classList.replace(
            "bi-eye-slash-fill",
            "bi-eye-fill"
        );

    }else{

        confirmPassword.type = "password";

        this.classList.replace(
            "bi-eye-fill",
            "bi-eye-slash-fill"
        );

    }

});

/* Password Strength */

password.addEventListener("input", function(){

    const value = password.value;

    const strengthFill =
    document.getElementById("strengthFill");

    const strengthText =
    document.getElementById("strengthText");

    let strength = 0;

    if(value.length >= 6) strength++;
    if(/[A-Z]/.test(value)) strength++;
    if(/[0-9]/.test(value)) strength++;
    if(/[^A-Za-z0-9]/.test(value)) strength++;

    if(strength === 1){

        strengthFill.style.width = "25%";
        strengthFill.style.background = "#ef4444";
        strengthText.innerText = "Weak password";

    }

    else if(strength === 2){

        strengthFill.style.width = "50%";
        strengthFill.style.background = "#f59e0b";
        strengthText.innerText = "Medium password";

    }

    else if(strength === 3){

        strengthFill.style.width = "75%";
        strengthFill.style.background = "#3b82f6";
        strengthText.innerText = "Strong password";

    }

    else if(strength === 4){

        strengthFill.style.width = "100%";
        strengthFill.style.background = "#22c55e";
        strengthText.innerText = "Very strong password";

    }

    else{

        strengthFill.style.width = "0%";
        strengthText.innerText = "Password strength";

    }

});

</script>

</body>
</html>
