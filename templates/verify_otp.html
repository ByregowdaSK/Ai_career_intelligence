<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify OTP | Career AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
                radial-gradient(circle at bottom right,#1d4ed8 0%,transparent 30%),
                linear-gradient(135deg,#020617,#0f172a,#111827);
            overflow:hidden;
            padding:20px;
        }

        .otp-card{
            width:100%;
            max-width:450px;
            background:rgba(30,41,59,0.95);
            border:1px solid rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border-radius:30px;
            padding:45px;
            box-shadow:0 20px 50px rgba(0,0,0,0.45);
            position:relative;
            overflow:hidden;
        }

        .otp-card::before{
            content:'';
            position:absolute;
            width:180px;
            height:180px;
            background:rgba(37,99,235,0.2);
            border-radius:50%;
            top:-60px;
            right:-60px;
        }

        .logo-box{
            width:90px;
            height:90px;
            margin:auto;
            margin-bottom:25px;
            border-radius:25px;
            background:linear-gradient(135deg,#2563eb,#3b82f6);
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 10px 25px rgba(37,99,235,0.4);
        }

        .logo-box i{
            font-size:38px;
            color:white;
        }

        .title{
            text-align:center;
            color:white;
            font-size:38px;
            font-weight:700;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#94a3b8;
            font-size:15px;
            margin-bottom:35px;
        }

        .alert{
            border:none;
            border-radius:14px;
            padding:14px;
            font-size:14px;
            margin-bottom:20px;
        }

        .form-label{
            color:#e2e8f0;
            font-weight:500;
            margin-bottom:10px;
        }

        .otp-input{
            height:60px;
            border:none;
            border-radius:16px;
            background:#e2e8f0;
            text-align:center;
            font-size:24px;
            letter-spacing:8px;
            font-weight:600;
            margin-bottom:25px;
        }

        .otp-input:focus{
            box-shadow:none;
            background:#f1f5f9;
        }

        .verify-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg,#2563eb,#3b82f6);
            color:white;
            font-size:18px;
            font-weight:600;
            transition:0.3s;
        }

        .verify-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(37,99,235,0.35);
        }

        .back-link{
            margin-top:25px;
            text-align:center;
        }

        .back-link a{
            color:#60a5fa;
            text-decoration:none;
            font-weight:500;
            transition:0.3s;
        }

        .back-link a:hover{
            color:white;
        }

        @media(max-width:500px){

            .otp-card{
                padding:35px 25px;
            }

            .title{
                font-size:32px;
            }

            .otp-input{
                font-size:20px;
                letter-spacing:5px;
            }

        }

    </style>

</head>

<body>

    <div class="otp-card">

        <!-- ICON -->

        <div class="logo-box">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <!-- TITLE -->

        <h1 class="title">
            Verify OTP
        </h1>

        <p class="subtitle">
            Enter the OTP sent to your email address
        </p>

        <!-- ERROR -->

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <!-- FORM -->

        <form method="POST">

            <label class="form-label">
                One Time Password
            </label>

            <input type="text"
                   name="otp"
                   class="form-control otp-input"
                   placeholder="••••••"
                   maxlength="6"
                   required>

            <button type="submit" class="verify-btn">
                <i class="fa-solid fa-check"></i>
                Verify OTP
            </button>

        </form>

        <!-- BACK -->

        <div class="back-link">

            <a href="/login">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Login
            </a>

        </div>

    </div>

</body>
</html>
