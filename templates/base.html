<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Career AI{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Sidebar -->
<div style="width:220px;height:100vh;position:fixed;background:#111827;color:white;padding:20px;">
    <h4>Career AI</h4>

    <a href="/dashboard" style="display:block;color:white;margin:10px 0;">Dashboard</a>
    <a href="/profile" style="display:block;color:white;margin:10px 0;">Profile</a>
    <a href="/recommend" style="display:block;color:white;margin:10px 0;">Recommend</a>
    <a href="/results" style="display:block;color:white;margin:10px 0;">Results</a>
    <a href="/resume" style="display:block;color:white;margin:10px 0;">Resume</a>
    <a href="/logout" style="display:block;color:white;margin:10px 0;">Logout</a>
</div>

<div style="margin-left:240px;padding:20px;">
    {% block content %}{% endblock %}

</body>
</html>
