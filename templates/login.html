<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career AI Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
        radial-gradient(circle at bottom right,#2563eb 0%,transparent 35%),
        linear-gradient(135deg,#0f172a,#111827,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Animated Background */

body::before,
body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(59,130,246,0.15);
    filter:blur(80px);
    animation:float 10s infinite alternate ease-in-out;
}

body::before{
    top:-120px;
    left:-120px;
}

body::after{
    bottom:-120px;
    right:-120px;
    animation-delay:2s;
}

@keyframes float{
    from{
        transform:translateY(0px) translateX(0px);
    }
    to{
        transform:translateY(40px) translateX(40px);
    }
}

/* Card */

.login-card{
    width:430px;
    padding:45px;
    border-radius:28px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.45),
        inset 0 0 1px rgba(255,255,255,0.4);
    animation:fadeIn 1s ease;
    position:relative;
    z-index:10;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Logo */

.logo-box{
    width:85px;
    height:85px;
    margin:auto;
    margin-bottom:20px;
    border-radius:22px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 8px 25px rgba(37,99,235,0.5);
}

.logo-box i{
    font-size:38px;
    color:white;
}

/* Headings */

h1{
    color:white;
    text-align:center;
    font-weight:700;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:35px;
}

/* Inputs */

.form-group{
    margin-bottom:22px;
    position:relative;
}

.form-label{
    color:#e2e8f0;
    margin-bottom:8px;
    font-size:14px;
    font-weight:500;
}

.form-control{
    height:56px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.12);
    color:white;
    padding-left:18px;
    padding-right:50px;
    font-size:15px;
    transition:0.3s;
    border:1px solid transparent;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-control:focus{
    background:rgba(255,255,255,0.18);
    box-shadow:none;
    border:1px solid #3b82f6;
    color:white;
    transform:translateY(-2px);
}

.input-icon{
    position:absolute;
    right:18px;
    top:50px;
    color:#cbd5e1;
    cursor:pointer;
    transition:0.3s;
}

.input-icon:hover{
    color:white;
}

/* Forgot Password */

.extra-links{
    display:flex;
    justify-content:flex-end;
    margin-top:-8px;
    margin-bottom:22px;
}

.extra-links a{
    color:#93c5fd;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.extra-links a:hover{
    color:white;
}

/* Button */

.login-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    font-size:17px;
    font-weight:600;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

.login-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(37,99,235,0.45);
}

.login-btn::before{
    content:'';
    position:absolute;
    width:120px;
    height:120%;
    background:rgba(255,255,255,0.18);
    transform:skewX(-20deg);
    left:-130px;
    top:-5px;
    transition:0.5s;
}

.login-btn:hover::before{
    left:120%;
}

/* Register */

.register-text{
    text-align:center;
    margin-top:28px;
    color:#cbd5e1;
    font-size:15px;
}

.register-text a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.register-text a:hover{
    color:white;
}

/* Alerts */

.alert{
    border:none;
    border-radius:14px;
    font-size:14px;
}

/* Responsive */

@media(max-width:500px){

    .login-card{
        width:92%;
        padding:35px 25px;
    }

}

</style>
</head>

<body>

<div class="login-card">

    <!-- Logo -->
    <div class="logo-box">
        <i class="bi bi-bar-chart-line-fill"></i>
    </div>

    <!-- Heading -->
    <h1>Career AI</h1>

    <p class="subtitle">
        AI-Based Career & Skill Gap Analysis
    </p>

    <!-- Error -->
    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <!-- Success -->
    {% if success %}
        <div class="alert alert-success">
            {{ success }}
        </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="/login">

        <!-- Email -->
        <div class="form-group">

            <label class="form-label">
                Email Address
            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
            >

            <i class="bi bi-envelope-fill input-icon"></i>

        </div>

        <!-- Password -->
        <div class="form-group">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="Enter your password"
                required
            >

            <i
                class="bi bi-eye-slash-fill input-icon"
                id="togglePassword"
            ></i>

        </div>

        <!-- Forgot -->
        <div class="extra-links">
            <a href="/forgot_password">
                Forgot Password?
            </a>
        </div>

        <!-- Button -->
        <button type="submit" class="login-btn">

            <i class="bi bi-box-arrow-in-right"></i>

            Login

        </button>

        <!-- Register -->
        <div class="register-text">

            Don’t have an account?

            <a href="/register">
                Register
            </a>

        </div>

    </form>

</div>

<!-- JS -->
<script>

const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");

togglePassword.addEventListener("click", function(){

    if(password.type === "password"){

        password.type = "text";

        this.classList.remove(
            "bi-eye-slash-fill"
        );

        this.classList.add(
            "bi-eye-fill"
        );

    }else{

        password.type = "password";

        this.classList.remove(
            "bi-eye-fill"
        );

        this.classList.add(
            "bi-eye-slash-fill"
        );

    }

});

</script>

</body>
</html>
