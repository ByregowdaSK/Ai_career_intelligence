<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | Career AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
                radial-gradient(circle at bottom right,#1d4ed8 0%,transparent 30%),
                linear-gradient(135deg,#020617,#0f172a,#111827);
            overflow:hidden;
            padding:20px;
        }

        .reset-card{
            width:100%;
            max-width:450px;
            background:rgba(30,41,59,0.95);
            border:1px solid rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            border-radius:30px;
            padding:45px;
            box-shadow:0 20px 50px rgba(0,0,0,0.45);
            position:relative;
            overflow:hidden;
            animation:fadeIn 0.5s ease;
        }

        .reset-card::before{
            content:'';
            position:absolute;
            width:180px;
            height:180px;
            background:rgba(37,99,235,0.2);
            border-radius:50%;
            top:-60px;
            right:-60px;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .logo-box{
            width:90px;
            height:90px;
            margin:auto;
            margin-bottom:25px;
            border-radius:25px;
            background:linear-gradient(135deg,#16a34a,#22c55e);
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 10px 25px rgba(34,197,94,0.35);
        }

        .logo-box i{
            font-size:38px;
            color:white;
        }

        .title{
            text-align:center;
            color:white;
            font-size:38px;
            font-weight:700;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#94a3b8;
            font-size:15px;
            margin-bottom:35px;
        }

        .form-label{
            color:#e2e8f0;
            font-weight:500;
            margin-bottom:10px;
        }

        .input-group{
            margin-bottom:25px;
        }

        .input-group-text{
            background:#e2e8f0;
            border:none;
            border-radius:14px 0 0 14px;
            color:#64748b;
        }

        .form-control{
            height:58px;
            border:none;
            border-radius:0 14px 14px 0;
            background:#e2e8f0;
            font-size:15px;
        }

        .form-control:focus{
            box-shadow:none;
            background:#f1f5f9;
        }

        .reset-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:16px;
            background:linear-gradient(135deg,#16a34a,#22c55e);
            color:white;
            font-size:18px;
            font-weight:600;
            transition:0.3s;
        }

        .reset-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(34,197,94,0.35);
        }

        .back-link{
            margin-top:25px;
            text-align:center;
        }

        .back-link a{
            color:#60a5fa;
            text-decoration:none;
            font-weight:500;
            transition:0.3s;
        }

        .back-link a:hover{
            color:white;
        }

        @media(max-width:500px){

            .reset-card{
                padding:35px 25px;
            }

            .title{
                font-size:32px;
            }

        }

    </style>

</head>

<body>

    <div class="reset-card">

        <!-- ICON -->

        <div class="logo-box">
            <i class="fa-solid fa-key"></i>
        </div>

        <!-- TITLE -->

        <h1 class="title">
            Reset Password
        </h1>

        <p class="subtitle">
            Create a strong new password for your account
        </p>

        <!-- FORM -->

        <form method="POST">

            <label class="form-label">
                New Password
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                </span>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter new password"
                       required>

            </div>

            <button type="submit" class="reset-btn">

                <i class="fa-solid fa-rotate"></i>
                Reset Password

            </button>

        </form>

        <!-- BACK -->

        <div class="back-link">

            <a href="/login">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Login
            </a>

        </div>

    </div>

</body>
</html>
